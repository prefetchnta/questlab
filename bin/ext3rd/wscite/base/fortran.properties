# Define SciTE settings for Fortran files.

filter.fortran=Fortran (f for f90 f95 f2k)|*.f;*.for;*.f90;*.f95;*.f2k|

*filter.fortran=$(filter.fortran)

file.patterns.f95=*.f90;*.f95;*.f2k
file.patterns.f77=*.f;*.for
file.patterns.fortran=$(file.patterns.f95);$(file.patterns.f77)

lexer.$(file.patterns.f95)=fortran
lexer.$(file.patterns.f77)=f77

*language.fortran=&Fortran|f90||

# keywords and input/output specifiers
keywordclass.fortran=abstract access action advance all allocatable allocate \
apostrophe assign assignment associate asynchronous backspace \
bind blank block blockdata call case change character class classof close common codimension \
complex concurrent contains contiguous continue critical cycle data deallocate decimal delim \
default deferred delegate dimension direct do dowhile double doubleprecision elemental else \
elseif elsewhere encoding end endassociate endblock endblockdata endcritical endenum enddo \
endfile endforall endfunction endif endinterface endmodule endprocedure endprogram \
endselect endsubmodule endsubroutine endteam endtype endwhere entry enum enumeration enumerator eor equivalence \
err errmsg error event exist exit extends external fail final file flush fmt forall form format \
formatted function generic go goto id if im image images implicit import impure in include inout \
integer inquire intent interface intrinsic iomsg iolength \
iostat is kind len lock logical memory module name named namelist nextrec nml non_intrinsic non_overridable \
non_recursive none notify null nullify number only open opened operator optional out pad \
parameter pass new_line nopass pause pending pointer pos position post precision \
print private procedure program protected public pure quote rank re read readwrite \
real rec recl recursive reference result return rewind round save select \
selectcase selecttype sequence sequential sign size stat static status stop stream \
submodule subroutine sync target team then to type typeof unformatted unit unlock use value \
volatile wait where while write

keywords.$(file.patterns.f95)=$(keywordclass.fortran)
keywords.$(file.patterns.f77)=$(keywordclass.fortran)

