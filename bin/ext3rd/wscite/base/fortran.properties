atan atan2 atan2d atand atanh atanpi atomic_add atomic_and atomic_cas atomic_define \
atomic_fetch_add atomic_fetch_and atomic_fetch_or atomic_fetch_xor atomic_or atomic_ref \
atomic_xor bessel_j0 bessel_j1 bessel_jn bessel_y0 bessel_y1 bessel_yn \
