btest c_sizeof cabs ccos cdabs cdcos cdexp cdlog cdsin cdsqrt ceiling cexp char \
clog cmplx co_broadcast co_max co_min co_reduce co_sum command_argument_count conjg \
cos cosd cosh coshape cospi count cpu_time cshift csin csqrt dabs \
dacos dacosd dasin dasind datan datan2 datan2d datand date \
