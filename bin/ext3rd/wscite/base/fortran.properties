iabs iachar iall iand iany ibclr ibits ibset ichar idate idim idint idnint ieor ifix \
iiabs iiand iibclr iibits iibset iidim iidint iidnnt iieor iifix iint iior iiqint iiqnnt iishft \
iishftc iisign ilen image_index image_status imax0 imax1 imin0 imin1 imod index inint inot \
